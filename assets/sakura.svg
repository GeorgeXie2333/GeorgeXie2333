<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 120" width="720" height="120" role="img" aria-label="falling sakura petals">
  <defs>
    <radialGradient id="petalGrad" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#FFE3F1"/>
      <stop offset="60%" stop-color="#F7B2D6"/>
      <stop offset="100%" stop-color="#F48FB1"/>
    </radialGradient>
    <radialGradient id="petalGrad2" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#F2F8FF"/>
      <stop offset="60%" stop-color="#B9E0FF"/>
      <stop offset="100%" stop-color="#8EC5FC"/>
    </radialGradient>
    <symbol id="petal" viewBox="-10 -10 20 20">
      <path d="M0,-8 C5,-4 5,4 0,8 C-5,4 -5,-4 0,-8 Z" fill="url(#petalGrad)" opacity="0.9"/>
    </symbol>
    <symbol id="petalB" viewBox="-10 -10 20 20">
      <path d="M0,-8 C5,-4 5,4 0,8 C-5,4 -5,-4 0,-8 Z" fill="url(#petalGrad2)" opacity="0.85"/>
    </symbol>
  </defs>

  <!-- Soft glow blobs slowly drifting -->
  <circle cx="80" cy="40" r="34" fill="#F7B2D6" opacity="0.10">
    <animate attributeName="cx" values="80;120;80" dur="9s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="40;55;40" dur="9s" repeatCount="indefinite"/>
  </circle>
  <circle cx="600" cy="70" r="40" fill="#B9E0FF" opacity="0.10">
    <animate attributeName="cx" values="600;560;600" dur="11s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="70;50;70" dur="11s" repeatCount="indefinite"/>
  </circle>

  <!-- Falling petals with rotation -->
  <g>
    <use href="#petal" x="60" y="-20" width="16" height="16">
      <animateTransform attributeName="transform" type="translate" values="0,-20; 40,140" dur="7s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="rotate" additive="sum" from="0 0 0" to="360 0 0" dur="5s" repeatCount="indefinite"/>
    </use>
  </g>
  <g>
    <use href="#petalB" x="160" y="-30" width="13" height="13">
      <animateTransform attributeName="transform" type="translate" values="0,-30; -25,150" dur="9s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="rotate" additive="sum" from="0 0 0" to="-360 0 0" dur="6s" repeatCount="indefinite"/>
    </use>
  </g>
  <g>
    <use href="#petal" x="280" y="-20" width="15" height="15">
      <animateTransform attributeName="transform" type="translate" values="0,-20; 20,150" dur="8s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="rotate" additive="sum" from="0 0 0" to="360 0 0" dur="5.5s" repeatCount="indefinite"/>
    </use>
  </g>
  <g>
    <use href="#petalB" x="400" y="-30" width="12" height="12">
      <animateTransform attributeName="transform" type="translate" values="0,-30; 35,150" dur="10s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="rotate" additive="sum" from="0 0 0" to="-360 0 0" dur="7s" repeatCount="indefinite"/>
    </use>
  </g>
  <g>
    <use href="#petal" x="520" y="-20" width="16" height="16">
      <animateTransform attributeName="transform" type="translate" values="0,-20; -15,150" dur="7.5s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="rotate" additive="sum" from="0 0 0" to="360 0 0" dur="5s" repeatCount="indefinite"/>
    </use>
  </g>
  <g>
    <use href="#petalB" x="640" y="-30" width="14" height="14">
      <animateTransform attributeName="transform" type="translate" values="0,-30; 10,150" dur="9.5s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="rotate" additive="sum" from="0 0 0" to="-360 0 0" dur="6.5s" repeatCount="indefinite"/>
    </use>
  </g>
</svg>
